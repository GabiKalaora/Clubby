<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Pricing Calculator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            margin: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            color: #6B7280;
            transition: all 0.2s;
            gap: 0.75rem;
        }
        
        .nav-item:hover {
            background-color: #F3F4F6;
        }
        
        .nav-item.active {
            background-color: #E7FCE7;
            color: #22C55E;
        }
        
        .nav-item svg {
            width: 1.25rem;
            height: 1.25rem;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg">
            <div class="p-6">
                <div class="text-2xl font-bold text-gray-800">AdManager</div>
            </div>
            <nav>
                <a href="home.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-grid"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="statistics.html" class="nav-item" style="background-color: rgb(243, 244, 246);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bar-chart-2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Statistics
                </a>
                <a href="ad.html" class="nav-item" style="background-color: transparent;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-upload"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Publish Advertisement
                </a>
                <a href="pricing.html" class="nav-item" style="background-color: transparent;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-dollar-sign"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Pricing
                </a>
                <a href="payment.html" class="nav-item" style="background-color: rgb(243, 244, 246);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-credit-card"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                    Payment
                </a>
                <a href="statistics.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bar-chart"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
                    Premium Statistics
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Pricing</h1>
                <div class="flex items-center">
                    <span class="mr-4">Welcome, User</span>
                    <img src="/api/placeholder/32/32" alt="User avatar" class="w-8 h-8 rounded-full"/>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="space-y-6">
                    <!-- Advertisement Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Advertisement Type</label>
                        <select id="adType" class="w-full p-2 border rounded-md">
                            <option>Regular</option>
                            <option>Premium</option>
                            <option>Featured</option>
                        </select>
                    </div>

                    <!-- Ad Scope -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ad Scope</label>
                        <select id="adScope" class="w-full p-2 border rounded-md">
                            <option>Sponsored Post</option>
                            <option>Banner Ad</option>
                            <option>Video Ad</option>
                        </select>
                    </div>

                    <!-- Date Range -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                            <input type="date" class="w-full p-2 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                            <input type="date" class="w-full p-2 border rounded-md">
                        </div>
                    </div>

                    <!-- Calculate Button -->
                    <button onclick="calculateBudget()" class="w-full bg-green-500 text-white py-3 rounded-md hover:bg-green-600 transition-colors">
                        Calculate Your Budget
                    </button>

                    <!-- Budget Display -->
                    <div class="mt-6 p-4 bg-gray-50 rounded-md">
                        <div class="flex justify-between items-center">
                            <span class="font-medium">Your Estimated Budget</span>
                            <span class="text-xl font-bold" id="totalBudget">USD 20.99</span>
                        </div>
                    </div>

                    <!-- Pay Button -->
                    <button class="w-full bg-green-500 text-white py-3 rounded-md hover:bg-green-600 transition-colors">
                        Pay Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateBudget() {
            // Simplified budget calculation - you would want to implement your actual pricing logic here
            const basePrice = 20.99;
            document.getElementById('totalBudget').textContent = `USD ${basePrice.toFixed(2)}`;
        }
    </script>
</body>
</html>
