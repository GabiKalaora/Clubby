<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Coupon Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            min-height: 100vh;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #2ecc71;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus {
            border-color: #2ecc71;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border: 2px solid #2ecc71;
            border-radius: 4px;
        }

        .save-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th {
            background: #2ecc71;
            color: white;
            text-align: left;
            padding: 12px;
            font-weight: 500;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        td:last-child {
            color: #2ecc71;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Manual Coupon Entry</h1>
            <p>Enter a manual coupon when you have created a physical coupon outside the POS</p>
        </div>

        <form>
            <div class="form-group">
                <label for="barcode">Barcode</label>
                <input type="text" id="barcode" placeholder="Enter barcode">
            </div>

            <div class="form-group">
                <label for="product">Product to "sell"</label>
                <input type="text" id="product" placeholder="Enter product">
            </div>

            <div class="form-group">
                <label for="start-date">Start Date</label>
                <input type="date" id="start-date">
            </div>

            <div class="form-group">
                <label for="end-date">End Date</label>
                <input type="date" id="end-date">
            </div>

            <div class="form-group">
                <label for="value">Coupon Value</label>
                <input type="number" id="value" placeholder="Enter value">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="single-use">
                <label for="single-use">Single Use per Customer?</label>
            </div>

            <button type="submit" class="save-btn">Save</button>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Barcode</th>
                            <th>FaceValue</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Product#</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>789789789</td>
                            <td>260.00</td>
                            <td>-</td>
                            <td>4-Jun-2020</td>
                            <td>11021</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </form>
    </div>
</body>
</html>
