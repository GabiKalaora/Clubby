<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Verification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
            margin-top: 8px;
            margin-bottom: 32px;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: none;
            background: #f8f8f8;
            border-radius: 12px;
            margin-bottom: 24px;
            box-sizing: border-box;
            color: #333;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-field::placeholder {
            color: #999;
            letter-spacing: normal;
        }

        .signin-button {
            width: 100%;
            padding: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }

        .signin-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign In</h1>
        <div class="subtitle">Welcome back</div>
        
        <input type="text" 
               class="input-field" 
               placeholder="Enter 6-digit code here"
               maxlength="6"
               pattern="\d{6}"
               inputmode="numeric">
        
               <a href="homepage.html"><button class="signin-button">SIGN IN</button></a>
    </div>
</body>
</html>
