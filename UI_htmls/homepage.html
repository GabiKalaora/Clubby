<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f7;
        }

        .mobile-frame {
            max-width: 480px;
            min-height: 100vh;
            margin: 0 auto;
            background: white;
            position: relative;
            padding-bottom: 80px;
            overflow: hidden;
        }

        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .signal-icons {
            display: flex;
            gap: 4px;
        }

        .header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .welcome-text {
            font-size: 18px;
            color: #333;
        }

        .welcome-text strong {
            font-weight: 600;
            color: #000;
        }

        .header-icons {
            display: flex;
            gap: 12px;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f7;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .search-container {
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .search-bar {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-input {
            background: none;
            border: none;
            outline: none;
            font-size: 16px;
            width: 100%;
            color: #666;
        }

        .carousel {
            padding: 0 16px;
            margin-bottom: 20px;
            position: relative;
        }

        .carousel-inner {
            border-radius: 16px;
            overflow: hidden;
        }

        .carousel-item {
            width: 100%;
            display: none;
        }

        .carousel-item.active {
            display: block;
        }

        .carousel-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
        }

        .dot.active {
            background: #333;
        }

        .notifications {
            padding: 0 16px;
        }

        .notification-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f8f8;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: contain;
            margin-right: 12px;
        }

        .notification-content {
            flex: 1;
            font-size: 14px;
            padding-right: 12px;
        }

        .notification-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #2ecc71;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn {
            background: #ff3b30;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: #333;
            display: flex;
            justify-content: space-around;
            padding: 16px;
            border-radius: 24px 24px 0 0;
        }

        .bottom-nav-item {
            color: #666;
            text-decoration: none;
            font-size: 24px;
        }

        .bottom-nav-item.active {
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="signal-icons">
                <span>📶</span>
                <span>📡</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="header">
            <div class="profile-section">
                <img src="https://i.pravatar.cc/150?img=8" alt="Profile" class="profile-img">
                <span class="welcome-text">Welcome, <strong>John</strong></span>
            </div>
            <div class="header-icons">
                <button class="icon-button">⚙️</button>
               <button class="icon-button"><a href="notification.html">🔔</button></a>
            </div>
        </div>

        <div class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="Search" class="search-input">
                <span>≡</span>
            </div>
        </div>

        <div class="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://images.unsplash.com/photo-1513639595782-31f25c297fdc" alt="KFC Promotion" class="carousel-img">
                </div>
            </div>
            <div class="carousel-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="notifications">
            <div class="notification-item">
                <a href="story.html"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Zara_Logo.svg/320px-Zara_Logo.svg.png" alt="Zara" class="brand-logo"></a>
                <div class="notification-content">
                    New Sale For New Customers 20% On All Products
                </div>
                <div class="notification-actions">
              <button class="action-btn">🔔</button>
                </div>
            </div>

            <div class="notification-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/McDonald%27s_Golden_Arches.svg/320px-McDonald%27s_Golden_Arches.svg.png" alt="McDonald's" class="brand-logo">
                <div class="notification-content">
                    New Sale For New Customers 20% On All Products
                </div>
                <div class="notification-actions">
                    <button class="action-btn">🔔</button>
                    <button class="action-btn delete-btn">🗑️</button>
                </div>
            </div>

            <div class="notification-item">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/KFC_logo.svg/320px-KFC_logo.svg.png" alt="KFC" class="brand-logo">
                <div class="notification-content">
                    New Sale For New Customers 20% On All Products
                </div>
                <div class="notification-actions">
                    <button class="action-btn">🔔</button>
                </div>
            </div>

            <div class="notification-item">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/KFC_logo.svg/320px-KFC_logo.svg.png" alt="KFC" class="brand-logo">
                <div class="notification-content">
                    New Sale For New Customers 20% On All Products
                </div>
                <div class="notification-actions">
                    <button class="action-btn">🔔</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="wallet.html" class="bottom-nav-item">👛</a>
            <a href="#" class="bottom-nav-item active">🚗</a>
            <a href="#" class="bottom-nav-item">🛒</a>
            <a href="#" class="bottom-nav-item">🛒</a>
        </div>
    </div>
</body>
</html>
